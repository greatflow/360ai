<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Agents</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --peach-50:#FFF1F2; --peach-100:#FFE0E3; --peach-200:#FEC9CF; --peach-300:#FCA3AC;
    --peach-400:#FA828D; --peach-500:#F45B6A; --peach-600:#E0404F;
    --ink:#101622; --ink-2:#5A6575; --ink-3:#94A0B0; --line:#E9EDF2;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;}
  body{font-family:"DM Sans",system-ui,-apple-system,sans-serif;background:#fff;}
  .hero{position:relative;width:100%;height:clamp(462px,62vw,500px);max-height:500px;
    background:radial-gradient(68% 58% at 50% 50%, rgba(250,130,141,0.06), transparent 72%), #FFFFFF;
    display:flex;justify-content:center;overflow:hidden;}
  .stage{width:100%;max-width:820px;height:100%;display:flex;flex-direction:column;justify-content:space-between;
    align-items:center;padding:14px clamp(12px,3vw,22px) 16px;}

  .lyr{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;width:100%;}
  .chip{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:12px;
    padding:7px 12px 7px 8px;box-shadow:0 2px 8px rgba(16,22,34,0.05);transition:border-color .35s,box-shadow .35s;}
  .chip .ci{width:30px;height:30px;border-radius:8px;flex:none;display:flex;align-items:center;justify-content:center;
    background:#F2F4F7;color:#6B7585;transition:background .35s,color .35s;}
  .chip .ci svg{width:17px;height:17px;}
  .chip .cl{display:flex;flex-direction:column;line-height:1.15;}
  .chip .cn{font-size:clamp(11px,1.8vw,12.5px);font-weight:600;color:var(--ink);white-space:nowrap;}
  .chip .cs{font-size:clamp(10px,1.7vw,11.5px);font-weight:700;color:var(--ink-2);white-space:nowrap;}
  .chip.on{border-color:#D4D9E3;box-shadow:0 4px 12px rgba(16,22,34,0.10);}
  .chip.on .ci{background:#E4E8EE;color:#475063;}

  .flow{position:relative;width:2px;height:clamp(15px,2.8vw,24px);background:var(--peach-100);border-radius:2px;flex:none;}
  .flow .fd{position:absolute;left:50%;width:5px;height:5px;border-radius:50%;background:var(--peach-400);transform:translate(-50%,-50%);animation:fdown 1.5s linear infinite;box-shadow:0 0 6px rgba(250,130,141,.6);}
  .flow .fd:nth-child(2){animation-delay:.75s;}
  @keyframes fdown{0%{top:-12%;opacity:0;}15%{opacity:1;}85%{opacity:1;}100%{top:112%;opacity:0;}}

  .corewrap{display:flex;flex-direction:column;align-items:center;gap:9px;}
  .duo{display:flex;align-items:center;justify-content:center;}
  .brand{height:clamp(66px,14vw,88px);width:auto;display:block;filter:drop-shadow(0 6px 16px rgba(16,22,34,0.10));}
  .clink{position:relative;width:clamp(26px,5vw,42px);height:2px;background:linear-gradient(90deg,var(--peach-200),var(--peach-400));}
  .clink .ld{position:absolute;top:50%;left:0;width:5px;height:5px;border-radius:50%;background:var(--peach-500);transform:translate(-50%,-50%);animation:lrun 1.4s linear infinite;}
  @keyframes lrun{0%{left:0;opacity:0;}20%{opacity:1;}80%{opacity:1;}100%{left:100%;opacity:0;}}
  .core{position:relative;width:clamp(40px,9vw,50px);height:clamp(40px,9vw,50px);}
  .core img{width:100%;height:100%;display:block;border-radius:50%;filter:drop-shadow(0 6px 16px rgba(244,91,106,0.28));}
  .core::before{content:"";position:absolute;inset:-8px;border-radius:50%;border:2px dashed var(--peach-200);animation:spin 9s linear infinite;}
  .core::after{content:"";position:absolute;inset:-2px;border-radius:50%;animation:glow 2.2s infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes glow{0%{box-shadow:0 0 0 0 rgba(250,130,141,0.42);}70%{box-shadow:0 0 0 14px rgba(250,130,141,0);}100%{box-shadow:0 0 0 0 rgba(250,130,141,0);}}
  .attrs{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;}
  .attr{font-size:clamp(9.5px,1.7vw,11px);font-weight:600;color:var(--ink-2);background:#fff;border:1px solid var(--line);
    border-radius:99px;padding:3px 10px;transition:.35s;white-space:nowrap;}
  .attr.on{color:#fff;background:var(--peach-400);border-color:var(--peach-400);box-shadow:0 3px 10px rgba(250,130,141,0.35);}

  .seclbl{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--peach-500);margin-bottom:7px;text-align:center;}

  .prodwrap{position:relative;width:100%;display:flex;flex-direction:column;align-items:center;}
  .prow{display:flex;justify-content:center;align-items:flex-start;gap:clamp(6px,2vw,16px);flex-wrap:wrap;}
  .pnode{display:flex;flex-direction:column;align-items:center;gap:5px;width:clamp(54px,12vw,90px);}
  .pic{position:relative;width:clamp(40px,9vw,48px);height:clamp(40px,9vw,48px);border-radius:50%;background:#fff;
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;transition:border-color .4s,box-shadow .4s,transform .4s;}
  .pic img{width:100%;height:100%;display:block;border-radius:50%;}
  .pnode.active .pic{border-color:var(--pc);box-shadow:0 0 0 2px var(--pc),0 7px 18px var(--pcs);transform:translateY(-2px);}
  .pname{font-size:clamp(9px,1.6vw,11px);font-weight:600;color:var(--ink-2);text-align:center;line-height:1.15;transition:color .4s;}
  .pnode.active .pname{color:var(--ink);}
  .pbus{position:relative;width:min(86%,520px);height:2px;background:var(--peach-100);margin-top:9px;border-radius:2px;}
  .pbus .pd{position:absolute;top:50%;left:0;width:6px;height:6px;border-radius:50%;background:var(--peach-400);transform:translate(-50%,-50%);box-shadow:0 0 7px rgba(250,130,141,.7);animation:sweep 3.2s linear infinite;}
  @keyframes sweep{0%{left:0;opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{left:100%;opacity:0;}}

  .intgwrap{width:100%;display:flex;flex-direction:column;align-items:center;}

  @media (prefers-reduced-motion: reduce){
    .core::before,.core::after,.fd,.ld,.pd{animation:none;}
  }
</style>
</head>

<script>
(function(){
  var attrs=[].slice.call(document.querySelectorAll('#attrs .attr'));

  var reduce=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  if(reduce){ if(attrs[0])attrs[0].classList.add('on'); pnodes.forEach(function(n){n.classList.add('active');}); return; }

  var ai=0,pi=0,ii=0;

})();
