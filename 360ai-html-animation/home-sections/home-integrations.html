<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>360AI Integrations Background V6 (orbit)</title>
<!--
  360AI animated integrations background.
  Fully self contained and responsive. Drop into any full screen section.

  TO SWAP IN REAL LOGOS:
  In the LOGOS array near the bottom, give any entry an "img" property
  set to a data URI or a file path, for example:
    { img: "data:image/png;base64,...." }   or   { img: "logos/bullhorn.png" }
  Entries with an "img" render the image inside the tile. Entries without
  it render the built in placeholder glyph and colour.

  TO SWAP THE CENTRE MARK:
  Replace the SVG inside <div class="brand-mark"> with your exact 360AI logo.
-->
<style>
  :root{
    --tile: clamp(34px, 4.6vmin, 56px);
    --brand: clamp(86px, 12vmin, 132px);
    --ring-colour: 208, 220, 240;   /* bright cool white-grey */
    --ripple-duration: 14s;
  }

  html, body{
    margin:0; padding:0; height:100%; width:100%;
    background:#000; overflow:hidden;
  }

  #stage{
    position:fixed; inset:0;
    background:
      radial-gradient(120% 120% at 50% 45%, #0a0c12 0%, #050608 42%, #000 100%);
    overflow:hidden;
  }

  /* ------- ripple circles -------
     Drawn on a canvas via requestAnimationFrame. Stroking a few thin arcs per
     frame is extremely light, the browser presents the canvas in one piece,
     and there is no layout or per-element repaint, so the growth is smooth
     with no flicker on any screen size. */
  .ripple-canvas{
    position:absolute; inset:0;
    pointer-events:none;
  }

  /* ------- centre brand ------- */
  .brand{
    position:absolute; top:50%; left:50%;
    width:var(--brand); height:var(--brand);
    transform:translate(-50%,-50%);
    z-index:5;
    animation:brand-breathe 6s ease-in-out infinite;
  }
  @keyframes brand-breathe{
    0%,100%{ transform:translate(-50%,-50%) scale(1); }
    50%    { transform:translate(-50%,-50%) scale(1.035); }
  }
  .brand-disc{
    position:absolute; inset:0; border-radius:50%;
    background:#fff;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.06),
      0 18px 50px rgba(0,0,0,0.55),
      0 0 70px rgba(120,150,255,0.10);
  }
  .brand-glow{
    position:absolute; inset:-40%; border-radius:50%;
    background:radial-gradient(circle, rgba(140,170,255,0.16), transparent 62%);
    animation:glow-pulse 6s ease-in-out infinite;
    pointer-events:none;
  }
  @keyframes glow-pulse{
    0%,100%{ opacity:.55; transform:scale(1); }
    50%    { opacity:.9;  transform:scale(1.06); }
  }
  .brand-mark{
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
  }
  .brand-mark svg{ width:100%; height:100%; display:block; }

  /* ------- provider logo tiles ------- */
  .logo-layer{ position:absolute; inset:0; z-index:4; }

  /* Each ring is a zero size point at the centre that slowly rotates,
     carrying its tiles in orbit around the 360AI mark. */
  .orbit-ring{ position:absolute; top:50%; left:50%; width:0; height:0; will-change:transform; }
  .orbit-ring.inner{ animation:orbit-cw  42s linear infinite; }
  .orbit-ring.outer{ animation:orbit-ccw 58s linear infinite; }

  /* Tiles are centred on the ring point then pushed out to their radius. */
  .orbit-tile{
    position:absolute; top:0; left:0;
    width:var(--tile); height:var(--tile);
    margin-left:calc(var(--tile) / -2);
    margin-top:calc(var(--tile) / -2);
  }

  /* The inner element counter rotates at exactly the ring's speed, so each
     logo stays upright and never appears upside down while it orbits. */
  .orbit-ring.inner .tile-inner{ animation:orbit-ccw 42s linear infinite; }
  .orbit-ring.outer .tile-inner{ animation:orbit-cw  58s linear infinite; }

  .tile-inner{
    width:100%; height:100%;
    border-radius:26%;
    background:transparent;
    display:flex; align-items:center; justify-content:center;
    overflow:hidden;
    will-change:transform;
    -webkit-backface-visibility:hidden; backface-visibility:hidden;
  }
  .tile-inner svg{ width:56%; height:56%; display:block; }
  .tile-inner img{
    width:100%; height:100%;
    object-fit:cover;
    display:block;
    image-rendering:auto;
  }

  @keyframes orbit-cw{  from{ transform:rotate(0deg); }   to{ transform:rotate(360deg); } }
  @keyframes orbit-ccw{ from{ transform:rotate(0deg); }   to{ transform:rotate(-360deg); } }

  @media (prefers-reduced-motion: reduce){
    .orbit-ring.inner, .orbit-ring.inner .tile-inner{ animation-duration:120s; }
    .orbit-ring.outer, .orbit-ring.outer .tile-inner{ animation-duration:150s; }
    .brand, .brand-glow{ animation-duration:20s; }
  }
</style>
</head>

    <canvas class="ripple-canvas" id="rippleCanvas" aria-hidden="true"></canvas>

    <div class="logo-layer" id="logoLayer"></div>

    <div class="brand">
      <div class="brand-glow"></div>
      <div class="brand-mark" aria-label="360AI">

      </div>
    </div>

<script>
(function(){
  "use strict";

  var stage = document.getElementById("stage");
  var rippleCanvas = document.getElementById("rippleCanvas");
  var rippleCtx = rippleCanvas.getContext("2d");
  var reduceMotion = window.matchMedia ? window.matchMedia("(prefers-reduced-motion: reduce)").matches : false;
  var logoLayer = document.getElementById("logoLayer");

  /* ---------- ripple circles (canvas + rAF) ---------- */
  var RIPPLE_COUNT = 8;
  var RIPPLE_SECONDS = 14;
  var RING_RGB = (getComputedStyle(document.documentElement)
                    .getPropertyValue("--ring-colour") || "208,220,240").trim();
  var rip = { W:0, H:0, cx:0, cy:0, r0:0, r1:0 };
  var rippleStart = nowMs();
  var rippleRunning = false;

  function nowMs(){
    return (window.performance && performance.now) ? performance.now() : Date.now();
  }

  function sizeRipples(){
    var W = stage.clientWidth, H = stage.clientHeight;
    var dpr = Math.min(window.devicePixelRatio || 1, 2);   /* cap for perf */
    rippleCanvas.width  = Math.round(W * dpr);
    rippleCanvas.height = Math.round(H * dpr);
    rippleCanvas.style.width  = W + "px";
    rippleCanvas.style.height = H + "px";
    rippleCtx.setTransform(dpr, 0, 0, dpr, 0, 0);          /* draw in CSS px */
    var minDim = Math.min(W, H);
    var brandPx = Math.max(86, Math.min(132, 12 * minDim / 100));
    rip.W = W; rip.H = H; rip.cx = W / 2; rip.cy = H / 2;
    rip.r0 = brandPx / 2;                                  /* start at logo edge */
    rip.r1 = 0.5 * Math.sqrt(W * W + H * H) * 1.04;        /* end past far corner */
  }

  function drawRipples(){
    var W = rip.W, H = rip.H, cx = rip.cx, cy = rip.cy;
    rippleCtx.clearRect(0, 0, W, H);
    rippleCtx.lineWidth = 1;
    var dur = RIPPLE_SECONDS * 1000 * (reduceMotion ? 1.7 : 1);
    var t = (nowMs() - rippleStart) / dur;
    for (var i = 0; i < RIPPLE_COUNT; i++){
      var phase = (t + i / RIPPLE_COUNT) % 1;
      if (phase < 0){ phase += 1; }
      var eased = 1 - Math.pow(1 - phase, 2.3);            /* gentle ease-out */
      var r = rip.r0 + (rip.r1 - rip.r0) * eased;
      var op = (phase < 0.06)
                 ? 0.6 * (phase / 0.06)              /* ease in at the logo edge */
                 : 0.6 * (1 - (phase - 0.06) / 0.94); /* fade out to 0 as it grows */
      if (op <= 0.002){ continue; }
      rippleCtx.beginPath();
      rippleCtx.arc(cx, cy, r, 0, Math.PI * 2);
      rippleCtx.strokeStyle = "rgba(" + RING_RGB + "," + op.toFixed(3) + ")";
      rippleCtx.stroke();
    }
    requestAnimationFrame(drawRipples);
  }

  function buildRipples(){
    sizeRipples();
    if (!rippleRunning){ rippleRunning = true; requestAnimationFrame(drawRipples); }
  }

         + 'stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';

  /* ---------- lifecycle ---------- */
  var timers = [];
  var slots = [];
  var tileSizePx = 48;

  function track(id){ timers.push(id); return id; }
  function clearTimers(){
    for (var i = 0; i < timers.length; i++){ clearTimeout(timers[i]); }
    timers = [];
  }

  /* Two fixed rings around the centre: an inner circle of 8 tiles close to
     the 360AI mark and an outer circle of 12. Tiles fade independently, so
     the two circles always stay balanced and the shape reads as circular. */
  function buildRingLayout(W, H){
    var half = Math.min(W, H) / 2;
    var vmin = Math.min(W, H) / 100;
    var brandR = Math.max(86, Math.min(132, 12 * vmin)) / 2;
    var maxR = half - tileSizePx * 0.7;
    if (maxR < 120){ maxR = 120; }

    var innerMin = brandR + tileSizePx * 0.85 + 8;   /* clear of the centre mark */
    var outer = maxR;
    var inner = Math.max(innerMin, maxR * 0.6);
    if (outer - inner < tileSizePx * 1.35){ inner = outer - tileSizePx * 1.35; }
    if (inner < innerMin){ inner = innerMin; }

    var sectorIn  = (Math.PI * 2) / 9;
    var sectorOut = (Math.PI * 2) / 12;
    return [
      { radius:inner, count:9,  offset: Math.random() * sectorIn },
      { radius:outer, count:12, offset: sectorOut * 0.5 + Math.random() * sectorOut }
    ];
  }

  function rand(a, b){ return a + Math.random() * (b - a); }

  var used = {};

  function pickLogoIndex(){
    var tries = 0, idx;
    do {
      idx = Math.floor(Math.random() * LOGOS.length);
      tries++;
    } while (used[idx] && tries < 60);
    return idx;
  }

  function paint(slot){
    var idx = pickLogoIndex();
    used[idx] = true;
    slot.logoIndex = idx;
    var item = LOGOS[idx];
    var inner = slot.tile.firstChild;
    if (item.img){
      inner.style.background = "transparent";
      inner.innerHTML = '<img alt="' + (item.name || "") + '" src="' + item.img + '">';
    } else {
      inner.style.background = item.colour || "#2F6BFF";
      inner.innerHTML = svg(GLYPHS[item.glyph], "#fff");
    }
  }

  /* All tiles are placed once and simply orbit. Each tile is centred on its
     ring point, rotated to its angle, pushed out to the radius, then rotated
     back so its box sits upright. The CSS counter rotation then holds it
     upright through the whole orbit, so no logo is ever upside down. */
  function build(){
    clearTimers();
    logoLayer.innerHTML = "";
    slots = [];
    used = {};
    buildRipples();

    var W = stage.clientWidth, H = stage.clientHeight;
    var vmin = Math.min(W, H) / 100;
    tileSizePx = Math.max(34, Math.min(56, 4.6 * vmin));

    var rings = buildRingLayout(W, H);
    var classes = ["inner", "outer"];

    for (var r = 0; r < rings.length; r++){
      var ring = rings[r];
      var count = ring.count;
      var offsetDeg = (ring.offset || 0) * 180 / Math.PI;

      var ringEl = document.createElement("div");
      ringEl.className = "orbit-ring " + (classes[r] || "outer");

      for (var j = 0; j < count; j++){
        var aj = offsetDeg + (j / count) * 360;
        var tile = document.createElement("div");
        tile.className = "orbit-tile";
        tile.style.transform =
          "rotate(" + aj + "deg) translate(0," + (-ring.radius) + "px) rotate(" + (-aj) + "deg)";
        var inner = document.createElement("div");
        inner.className = "tile-inner";
        tile.appendChild(inner);
        ringEl.appendChild(tile);

        var slot = { tile:tile };
        paint(slot);
        slots.push(slot);
      }
      logoLayer.appendChild(ringEl);
    }
  }

  var resizeId;
  window.addEventListener("resize", function(){
    clearTimeout(resizeId);
    resizeId = setTimeout(build, 260);
  });

  build();
})();
</script>
